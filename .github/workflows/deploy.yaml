name: Deploy to GCP VM

on:
  push:
    branches: [ "main" ]

env:
  PROJECT_ID: "REDACTED_GCP_PROJECT" 
  GAR_LOCATION: "us-west1"
  REPOSITORY: "mcp-repo"
  IMAGE: "mcp-server"
  VM_IP: "REDACTED_VM_IP"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 구글 클라우드 로그인
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # 2. Docker 로그인 (Artifact Registry)
      - name: Docker Auth
        id: docker-auth
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}

      # 3. 이미지 빌드해서 구글 저장소(Registry)로 보내기
      - name: Build and Push Container
        run: |
          docker build -t "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:latest" .
          docker push "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:latest"

      # 4. VM에 접속해서 멀티유저 서버 + 대시보드 실행
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.VM_IP }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # (1) Docker 권한 재확인
            gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

            # (2) 기존에 돌아가는 서버 끄고 삭제 (에러 무시)
            docker stop mcp-server || true
            docker rm mcp-server || true
            
            # (3) 구글 저장소에서 새 이미지 가져오기
            docker pull ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:latest

            # (4) 멀티유저 서버 실행 (8000번 포트)
            mkdir -p ~/mcp_data/db
            mkdir -p ~/mcp_data/chromadb
            docker run -d \
              --name mcp-server \
              --restart unless-stopped \
              -p 8000:8000 \
              -p 8001:8001 \
              -v /home/deploy/mcp_data/db:/app/data/db \
              -v /home/deploy/mcp_data/chromadb:/app/data/chromadb \
              -e MCP_MODE="sse" \
              -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
              -e SF_CLIENT_ID="${{ secrets.SF_CLIENT_ID }}" \
              -e SF_USERNAME="${{ secrets.SF_USERNAME }}" \
              -e SF_PRIVATE_KEY="${{ secrets.SF_PRIVATE_KEY }}" \
              -e GMAIL_CREDENTIALS="${{ secrets.GMAIL_CREDENTIALS }}" \
              -e GMAIL_TOKEN="${{ secrets.GMAIL_TOKEN }}" \
              -e GMAIL_TOKEN_FINANCE="${{ secrets.GMAIL_TOKEN_FINANCE }}" \
              ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:latest
            
            # (5) 소스코드 동기화 (대시보드용)
            echo "=== 소스코드 동기화 ==="
            cd ~
            sudo rm -rf ai_mcp_fastmcp_remote
            git clone https://${{ secrets.GH_TOKEN }}@github.com/ai_mcp_fastmcp_remote/ai_mcp_fastmcp_remote.git
            
          
            
            # (6) 서버 상태 확인
            echo "=== 서버 상태 확인 ==="
            docker logs mcp-server --tail 20
            echo ""
            echo "=== 멀티유저 엔드포인트 ==="
            echo "  - http://${{ env.VM_IP }}:8000/mcp/user/admin/sse"
            echo "  - http://${{ env.VM_IP }}:8000/mcp/user/sales/sse"
            echo "  - http://${{ env.VM_IP }}:8000/mcp/user/finance/sse"
            echo ""
            echo "=== 대시보드 (수동 실행 필요) ==="
            echo "  ssh 접속 후: cd ~/ai_mcp_fastmcp_remote && nohup ~/.local/bin/streamlit run dashboard.py --server.port 8501 --server.address 0.0.0.0 &"